<!DOCTYPE html>
<html lang="en">
	<head>
		<title>HTML_Table</title>
<link rel="stylesheet" type="text/css" href="CSS_Table.css">
		
	</head>
	<body
		<h1>Coffee drinks</h1>
		<table style="width:100%">

				<th>Name</th>

				<td>Capuccino</td>

			<tr>
				<td>Latte</td>
				<td>4.50</td>
				<td>Hot</td>
				<td>Small,Medium, Tall</td>
			</tr>
			<tr>
				<td>Mocha</td>
				<td>5.00</td>
				<td>Hot or cold</td>
				<td>Small,Medium, Tall</td>
			</tr>
